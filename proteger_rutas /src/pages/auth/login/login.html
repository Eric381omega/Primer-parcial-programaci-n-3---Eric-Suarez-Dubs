<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="../../../styles.css">
</head>

<body>

    <div class="login-container">

        <div class="login-card">
            <h1 class="login-title">🍔 Bienvenido</h1>
            <p class="login-subtitle">Iniciá sesión para continuar</p>

            <form id="form" class="login-form">

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="example@example.com" autocomplete="off">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="********" autocomplete="off">
                </div>

                <div class="form-group">
                    <label for="rol">Rol</label>
                    <select name="rol" id="rol">
                        <option value="">Seleccione un rol</option>
                        <option value="client">Cliente</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>

                <button type="submit" class="btn primary">Ingresar</button>

            </form>
        </div>

    </div>

    <script type="module" src="./login.ts"></script>
</body>
</html>
